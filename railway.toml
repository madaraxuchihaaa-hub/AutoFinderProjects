# API + веб (server/public) на одном порту. Expo web здесь не собирается.
#
# Переменные в Railway → Variables:
#   JWT_SECRET      — случайная строка 32+ символов
#   DATABASE_URL    — PostgreSQL (или PGHOST/PGUSER/…)
#   DISABLE_STATIC_CACHE=1 — отключить кэш CSS/JS (если после деплоя не видно обновлений)
#   SEED_TEST_DATA  — 1: при старте выполнить сид из server/test-data/manifest.json; 0 или не задавать — выкл.
#                      Фото в репозитории (server/test-data/photos) попадают в образ. Нет файла — объявление без фото (лог).
#   TEST_DATA_PHOTOS_DIR — опционально: другой путь к jpg (том Railway); иначе — server/test-data/photos.
#   Фото объявлений (uploads): по умолчанию server/uploads. Том Railway смонтируйте на этот путь,
#   например mount path = server/uploads (или задайте UPLOAD_DIR и смонтируйте туда же).
#
# Быстрее: Settings → Root Directory = server (тогда startCommand = npm start).
[build]
buildCommand = "npm run build:railway"

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 120
