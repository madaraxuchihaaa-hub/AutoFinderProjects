# API + веб (server/public) на одном порту. Expo web здесь не собирается.
#
# Переменные в Railway → Variables:
#   JWT_SECRET      — случайная строка 32+ символов
#   DATABASE_URL    — PostgreSQL (или PGHOST/PGUSER/…)
#   PUBLIC_BASE_URL — https://<ваш-домен> (URL картинок /uploads)
#
# Быстрее: Settings → Root Directory = server (тогда startCommand = npm start).
[build]
buildCommand = "npm run build:railway"

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 120
