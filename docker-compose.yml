# Полный стек: PostgreSQL + API (веб-интерфейс в server/public на том же порту).
#
# Запуск: docker compose up --build
#   или с файлом переменных: docker compose --env-file .env.docker up --build
# Сайт и API: http://localhost:3000  (веб + /api/…)
#
# Для телефона/эмулятора задайте EXPO_PUBLIC_API_URL=http://<IP_ПК>:3000 при локальном npm start.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-autofinder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-autofinder}
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-docker-dev-only-change-me-min-32-characters-long}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

volumes:
  postgres_data:
