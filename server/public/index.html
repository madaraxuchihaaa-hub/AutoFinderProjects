<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AutoFinder — объявления о продаже автомобилей в Беларуси" />
    <title>AutoFinder</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header class="header">
      <a href="#/" class="logo">
        <span class="logo-mark" aria-hidden="true">AF</span>
        <span class="logo-text">AutoFinder</span>
      </a>
      <nav class="nav" aria-label="Основное">
        <a href="#/" data-nav="home">Главная</a>
        <a href="#/listings" data-nav="listings">Объявления</a>
      </nav>
      <div class="header-actions">
        <span id="auth-label" class="auth-label hidden"></span>
        <button type="button" id="btn-login" class="btn btn-ghost">Войти</button>
        <button type="button" id="btn-logout" class="btn btn-ghost hidden">Выйти</button>
      </div>
    </header>

    <main id="app" class="main"></main>

    <footer class="footer">
      <p>AutoFinder · API на этом же хосте · <a href="/health">/health</a></p>
    </footer>

    <dialog id="login-dialog" class="dialog">
      <form id="login-form" method="dialog">
        <h2>Вход</h2>
        <label>
          Email
          <input type="email" name="email" required autocomplete="username" />
        </label>
        <label>
          Пароль
          <input type="password" name="password" required autocomplete="current-password" />
        </label>
        <p id="login-error" class="error hidden" role="alert"></p>
        <div class="dialog-actions">
          <button type="button" class="btn btn-ghost" data-close-dialog>Отмена</button>
          <button type="submit" class="btn btn-primary">Войти</button>
        </div>
      </form>
    </dialog>

    <dialog id="detail-dialog" class="dialog dialog-wide">
      <button type="button" class="dialog-close" data-close-dialog aria-label="Закрыть">×</button>
      <div id="detail-body"></div>
    </dialog>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
